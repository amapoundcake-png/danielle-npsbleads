name: Follow-up Emails

on:
  schedule:
    - cron: '0 14 * * *'   # 10am ET (UTC-4) every day — send follow-ups
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  followup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Run follow-up job
        env:
          GMAIL_ADDRESS: danniadamsprojects@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          FOLLOW_UP_DAYS_MIN: 4
          FOLLOW_UP_DAYS_MAX: 6
          DAILY_LEAD_TARGET: 12
        run: python main.py followup
