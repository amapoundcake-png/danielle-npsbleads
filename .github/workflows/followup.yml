name: Follow-up Emails

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10am ET (UTC-4) weekdays — send follow-ups
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  followup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt in ahead of June 16 forced cutover

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SERVICE_ACCOUNT_JSON" > service_account.json
          if [ ! -s service_account.json ]; then
            echo "::error::SERVICE_ACCOUNT_JSON secret is empty. Go to repo Settings → Secrets → Actions and paste a fresh service account key JSON."
            exit 1
          fi
          python3 -c "import json; json.load(open('service_account.json'))" 2>/dev/null || {
            echo "::error::service_account.json is not valid JSON. The SERVICE_ACCOUNT_JSON secret may be truncated or malformed."
            exit 1
          }

      - name: Run follow-up job
        env:
          GMAIL_ADDRESS: danniadamsprojects@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          FOLLOW_UP_DAYS_MIN: 4
          FOLLOW_UP_DAYS_MAX: 6
          DAILY_LEAD_TARGET: 12
        run: python main.py followup
